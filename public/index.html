<!DOCTYPE html>
<html>
<head>
    <title>Student Study & Attendance Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Student Study & Attendance Tracker</h1>

<div class="form-section">
    <button onclick="exportData()">Export Data</button>
    <button onclick="toggleDarkMode()">Dark Mode</button>
    <input type="text" id="studentName" placeholder="Enter student name">
    <button onclick="addStudent()">Add Student</button>
</div>
<div id="summarySection"></div>
<input type="text" id="searchInput" placeholder="Search student..." onkeyup="searchStudents()">
<select id="subjectFilter" onchange="filterBySubject()">
    <option value="">Filter by Subject</option>
</select>
<div id="studentList"></div>

<script src="script.js"></script> 

</body>
</html>
